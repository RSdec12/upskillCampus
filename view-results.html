<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Results</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/results.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div class="container">

        <h1>Saved Student Results</h1>

        <input type="text" id="searchResult" placeholder="Search by Roll Number or Name" onkeyup="searchResults()">

        <table id="resultTable">

            <thead>

                <tr>

                    <th>Roll</th>
                    <th>Name</th>
                    <th>Total</th>
                    <th>%</th>
                    <th>Grade</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <script src="js/view-results.js"></script>
    <footer>

        <p>

            © 2026 Student Result Management System

            | Developed by Reetu Oram

        </p>

    </footer>
</body>

</html>
